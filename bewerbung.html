<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&T | Bewirb dich jetzt</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<nav>
    <a href="index.html" class="logo">D&T <span>TRANSPORTE</span></a>
    <div class="nav-links">
        <a href="index.html">Start</a>
        <a href="bewerbung.html" class="active">Bewerben</a>
        <a href="regeln.html">Regeln</a>
        <a href="event.html">Events</a>
    </div>
</nav>

<header class="hero">
    <span>Werde Teil des Teams</span>
    <h1>Starte deine <br><span>Karriere.</span></h1>
    <p>Wir suchen immer motivierte Fahrer. Füll das Formular aus und wir melden uns bei dir für ein kurzes Kennenlernen auf dem Discord.</p>
</header>

<div class="container">
    <form class="card" style="max-width: 800px; margin: 0 auto;" action="https://formspree.io/f/xdakqdqd" method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Vollständiger Name / Nickname</label>
                <input type="text" name="Name" required placeholder="z.B. Max Mustermann">
            </div>
            <div class="form-group">
                <label>Dein Alter</label>
                <input type="number" name="Alter" required placeholder="z.B. 22">
            </div>
        </div>

        <div class="form-group">
            <label>Steam Profil Link</label>
            <input type="url" name="Steam" required placeholder="https://steamcommunity.com/id/...">
        </div>

        <div class="form-group">
            <label>Besitzt du DLCs?</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #0d0d0f; padding: 15px; border-radius: 6px;">
                <label style="font-size: 0.7rem;"><input type="checkbox" name="DLC" value="Going East"> Going East</label>
                <label style="font-size: 0.7rem;"><input type="checkbox" name="DLC" value="Scandinavia"> Scandinavia</label>
                <label style="font-size: 0.7rem;"><input type="checkbox" name="DLC" value="France"> Vive la France</label>
                <label style="font-size: 0.7rem;"><input type="checkbox" name="DLC" value="Italia"> Italia</label>
                <label style="font-size: 0.7rem;"><input type="checkbox" name="DLC" value="Baltic"> Baltic Sea</label>
                <label style="font-size: 0.7rem;"><input type="checkbox" name="DLC" value="Black Sea"> Black Sea</label>
                <label style="font-size: 0.7rem;"><input type="checkbox" name="DLC" value="Iberia"> Iberia</label>
                <label style="font-size: 0.7rem;"><input type="checkbox" name="DLC" value="Balkans"> West Balkans</label>
            </div>
        </div>

        <div class="form-group">
            <label>Warum möchtest du zu D&T?</label>
            <textarea name="Grund" rows="5" placeholder="Erzähl uns kurz etwas über dich..."></textarea>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Bewerbung absenden</button>
    </form>
</div>

<footer>&copy; 2026 D&T Transporte</footer>
</body>
</html>
