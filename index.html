<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&T Transporte | Premium Logistik</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505;
            --surface: #0f0f0f;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.08);
            --holo: linear-gradient(90deg, #00f2ff, #0066ff, #7000ff, #00f2ff);
            --text-secondary: #888;
        }

        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg);
            color: #fff; 
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* Subtiles Hintergrund-Raster mit Tiefe */
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(20, 20, 20, 0) 0%, var(--bg) 80%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            z-index: -1;
        }

        /* Holo-Text Animation verfeinert */
        .holo-text {
            background: var(--holo);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: holo-flow 5s linear infinite;
        }

        @keyframes holo-flow {
            to { background-position: 300% center; }
        }

        /* Hero Sektion */
        .hero {
            padding: 120px 20px 80px;
            text-align: center;
            position: relative;
        }

        h1 { 
            font-family: 'Barlow Condensed', sans-serif;
            font-size: clamp(4rem, 15vw, 9rem); 
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -4px;
            line-height: 0.85;
        }

        .tagline {
            font-family: 'Barlow Condensed';
            font-size: 1.2rem;
            letter-spacing: 8px;
            color: var(--text-secondary);
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* Modernere Buttons */
        .social-bar {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            text-decoration: none;
            text-transform: uppercase;
            font-family: 'Barlow Condensed';
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }

        /* Main Grid */
        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 60px;
            background: rgba(10, 10, 10, 0.5);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .nav-box {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 60px 40px;
            text-decoration: none;
            color: white;
            transition: all 0.5s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 180px;
        }

        .nav-box i { 
            font-size: 1.2rem; 
            margin-bottom: auto; 
            color: var(--text-secondary);
            transition: 0.3s;
        }

        .nav-box span { 
            font-family: 'Barlow Condensed'; 
            font-size: 2.5rem; 
            font-weight: 900; 
            text-transform: uppercase;
            line-height: 1;
        }

        .nav-box:hover {
            border-color: #fff;
            background: #111;
        }

        .nav-box:hover i {
            color: #fff;
            transform: scale(1.2);
        }

        /* Sidebar / Missions */
        .label {
            font-family: 'Barlow Condensed';
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .label::after {
            content: '';
            height: 1px;
            flex-grow: 1;
            background: var(--border);
        }

        .event-item {
            margin-bottom: 40px;
            position: relative;
            padding-left: 20px;
            border-left: 2px solid var(--border);
            transition: 0.3s;
        }

        .event-item:hover {
            border-left-color: #fff;
        }

        .event-item p { 
            color: var(--text-secondary); 
            font-size: 0.75rem; 
            margin: 0 0 8px 0; 
            font-weight: 600;
        }

        .event-item h3 { 
            margin: 0 0 15px 0; 
            font-family: 'Barlow Condensed'; 
            font-size: 1.8rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .event-link {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 8px 16px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .event-link:hover {
            background: #fff;
            color: #000;
        }

        /* Glow Mouse */
        #cursor-glow {
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 100;
            transition: width 0.3s, height 0.3s;
        }

        @media (max-width: 1000px) {
            .container { 
                grid-template-columns: 1fr; 
                margin: 20px;
                padding: 20px;
            }
            .manifest-container { border-top: 1px solid var(--border); padding-top: 40px; }
            h1 { font-size: 5rem; }
        }
    </style>
</head>
<body>

<div id="cursor-glow"></div>
<div class="grid-bg"></div>

<header class="hero">
    <div style="overflow: hidden;">
        <h1>D&T <span class="holo-text">TRANSPORTE</span></h1>
    </div>
    <p class="tagline">Einfach bewegen.</p>
    
    <div class="social-bar">
        <a href="https://discord.gg/kTJpEdqpKp" target="_blank" class="btn">
            <i class="fab fa-discord"></i><span>Discord Community</span>
        </a>
        <a href="https://truckersmp.com/vtc/85915" target="_blank" class="btn">
            <i class="fas fa-truck"></i><span>TruckersMP Hub</span>
        </a>
    </div>
</header>

<main class="container">
    <section class="nav-grid">
        <a href="bewerbung.html" class="nav-box">
            <i class="fas fa-plus"></i>
            <span>Bewerben</span>
        </a>
        <a href="regeln.html" class="nav-box">
            <i class="fas fa-shield-halved"></i>
            <span>Statuten</span>
        </a>
        <a href="event.html" class="nav-box">
            <i class="fas fa-terminal"></i>
            <span>Einsätze</span>
        </a>
    </section>

    <aside class="manifest-container">
        <span class="label">Live Mission Manifest</span>
        <div id="eventDisplay">
            </div>
    </aside>
</main>

<script>
    // Flüssiger Glow-Effekt
    const glow = document.getElementById('cursor-glow');
    let curX = 0, curY = 0, tgX = 0, tgY = 0;

    document.addEventListener('mousemove', e => {
        tgX = e.clientX;
        tgY = e.clientY;
    });

    function move() {
        curX += (tgX - curX) * 0.1;
        curY += (tgY - curY) * 0.1;
        glow.style.left = curX + 'px';
        glow.style.top = curY + 'px';
        requestAnimationFrame(move);
    }
    move();

    // Supabase Integration
    const supabaseUrl = 'https://dihdeuphymaxgxthnjxq.supabase.co';
    const supabaseKey = 'sb_publishable_DOAE2-PtSAC0J2iqFOvfyg_AihL7t74';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadEvents() {
        const container = document.getElementById('eventDisplay');
        try {
            const { data, error } = await _supabase
                .from('dt-event-portal')
                .select('*')
                .eq('confirmed', true)
                .order('id', { ascending: false });

            if (!data || data.length === 0) {
                container.innerHTML = "<p style='opacity:0.3; font-size: 0.8rem; letter-spacing: 2px;'>STANDBY: NO ACTIVE MISSIONS</p>";
                return;
            }

            data.forEach(ev => {
                const item = document.createElement('div');
                item.className = 'event-item';
                item.innerHTML = `
                    <p>${new Date(ev.event_date).toLocaleDateString('de-DE')} // LOG_ENTRY</p>
                    <h3>${ev.vtc_name}</h3>
                    <a href="${ev.tmp_link}" target="_blank" class="event-link">Zugriff verwalten</a>
                `;
                container.appendChild(item);
            });
        } catch (e) {
            container.innerHTML = "<p>OFFLINE</p>";
        }
    }

    loadEvents();
</script>

</body>
</html>
